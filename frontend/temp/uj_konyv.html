<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>Új könyv</title>
    <link rel="stylesheet" href="./bootstrap/css/bootstrap.min.css">
    <script src="./bootstrap/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="./konyvtari.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a href="index.html" class="btn btn-light me-2">
                Vissza a főoldalra
            </a>
            <a href="./konyvek_listaja.html" class="nav-link">Könyvek listája</a>
            <a href="./uj_konyv.html" class="nav-link">Új könyv</a>
            <a href="./boritokep_modositas.html" class="nav-link">Borító módosítása</a>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-6">
                <h2 class="text-center">Új könyv felvétele</h2>

                <form>

                    <div class="mb-3">
                        <label class="form-label">Könyv címe</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Szerző</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Kiadás éve</label>
                            <input type="number" class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Műfaj</label>
                            <input type="text" class="form-control">
                        </div>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">Borító linkje</label>
                        <input type="text" class="form-control" placeholder="kepek/konyv.jpg">
                    </div>

                    <button class="btn btn-warning w-100 mt-5">
                        Mentés
                    </button>

                </form>
            </div>
        </div>
    </div>
